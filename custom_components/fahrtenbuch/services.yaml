start_trip:
  name: Fahrt starten
  description: >
    Startet eine neue Fahrt. KM-Stand und Standort werden automatisch vom
    Sensor gelesen. Mit start_km kann der KM-Stand manuell überschrieben
    werden (nützlich wenn der Sensor verzögert aktualisiert).
  fields:
    start_km:
      name: Start-KM (manuell)
      description: >
        Optionaler KM-Stand bei Fahrtbeginn. Wenn angegeben, wird der
        Sensorwert ignoriert.
      required: false
      example: 12345
      selector:
        number:
          min: 0
          max: 9999999
          step: 0.1
          unit_of_measurement: km

stop_trip:
  name: Fahrt beenden
  description: >
    Beendet die aktuelle Fahrt, berechnet die gefahrenen Kilometer und
    speichert den Eintrag im Fahrtenbuch. Mit end_km kann der KM-Stand
    manuell angegeben werden wenn der Sensor noch veraltet ist.
  fields:
    trip_type:
      name: Fahrtentyp
      description: Art der Fahrt
      required: true
      example: dienstlich
      selector:
        select:
          options:
            - label: Dienstlich
              value: dienstlich
            - label: Privat
              value: privat
    purpose:
      name: Zweck / Ziel
      description: Optionale Beschreibung (z. B. "Kundentermin München")
      required: false
      example: Kundentermin München
      selector:
        text:
    end_km:
      name: End-KM (manuell)
      description: >
        Optionaler KM-Stand bei Fahrtende. Wenn angegeben, wird der
        Sensorwert ignoriert – ideal wenn der Sensor noch nicht aktualisiert hat.
      required: false
      example: 12388
      selector:
        number:
          min: 0
          max: 9999999
          step: 0.1
          unit_of_measurement: km

export_csv:
  name: Als CSV exportieren
  description: >
    Exportiert alle Fahrten als CSV-Datei in das Home Assistant
    Konfigurationsverzeichnis (fahrtenbuch_YYYYMMDD_HHMMSS.csv).
  fields: {}

update_trip:
  name: Fahrt bearbeiten
  description: >
    Ändert KM-Werte, Fahrtentyp oder Zweck eines bestehenden Eintrags.
    km_driven wird automatisch neu berechnet.
  fields:
    trip_id:
      name: Fahrt-ID
      description: ID der zu bearbeitenden Fahrt (aus dem Sensor-Attribut)
      required: true
      selector:
        text:
    start_km:
      name: Start-KM
      required: false
      selector:
        number:
          min: 0
          max: 9999999
          step: 0.1
          unit_of_measurement: km
    end_km:
      name: End-KM
      required: false
      selector:
        number:
          min: 0
          max: 9999999
          step: 0.1
          unit_of_measurement: km
    trip_type:
      name: Fahrtentyp
      required: false
      selector:
        select:
          options:
            - label: Dienstlich
              value: dienstlich
            - label: Privat
              value: privat
    purpose:
      name: Zweck / Ziel
      required: false
      selector:
        text:

delete_trip:
  name: Fahrt löschen
  description: Löscht einen einzelnen Fahrteneintrag anhand seiner ID.
  fields:
    trip_id:
      name: Fahrten-ID
      description: >
        Die interne ID der Fahrt. Zu finden im Attribut "letzte_fahrten"
        des Sensors "Fahrten gesamt".
      required: true
      selector:
        text:
