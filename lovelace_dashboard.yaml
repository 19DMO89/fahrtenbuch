# Fahrtenbuch Lovelace Dashboard
#
# Einbinden via: Einstellungen → Dashboards → Dashboard hinzufügen → YAML
# oder den Inhalt in eine bestehende Lovelace-Konfiguration kopieren.
#
# Voraussetzung für die Bearbeiten-Sektion: fahrtenbuch_helpers.yaml
# als HA-Package eingebunden (siehe Kommentar in der Datei).

title: Fahrtenbuch
views:
  - title: Fahrtenbuch
    icon: mdi:car-key
    path: fahrtenbuch
    cards:

      # ---- Statusanzeige -------------------------------------------------
      - type: entities
        title: Fahrtenstatus
        show_header_toggle: false
        entities:
          - entity: sensor.fahrtenbuch_status
            name: Status
          - type: divider
          - entity: sensor.fahrtenbuch_fahrten_gesamt
            name: Fahrten gesamt
          - entity: sensor.fahrtenbuch_dienstliche_km
            name: Dienstliche KM (gesamt)
          - entity: sensor.fahrtenbuch_private_km
            name: Private KM (gesamt)

      # ---- Aktive Fahrt (nur sichtbar wenn Fahrt läuft) ------------------
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.fahrtenbuch_status
            state: "Fahrt aktiv"
        card:
          type: entities
          title: Aktive Fahrt
          show_header_toggle: false
          entities:
            - entity: sensor.fahrtenbuch_aktuelle_fahrt_start_km
              name: Start-KM

      # ---- Aktions-Buttons -----------------------------------------------
      - type: horizontal-stack
        cards:

          - type: button
            name: Fahrt starten
            icon: mdi:play-circle-outline
            icon_height: 48px
            tap_action:
              action: call-service
              service: fahrtenbuch.start_trip
              confirmation:
                text: Fahrt jetzt starten?

          - type: button
            name: Dienstlich beenden
            icon: mdi:briefcase-check-outline
            icon_height: 48px
            tap_action:
              action: call-service
              service: fahrtenbuch.stop_trip
              service_data:
                trip_type: dienstlich
              confirmation:
                text: Fahrt als DIENSTLICH beenden?

          - type: button
            name: Privat beenden
            icon: mdi:home-check-outline
            icon_height: 48px
            tap_action:
              action: call-service
              service: fahrtenbuch.stop_trip
              service_data:
                trip_type: privat
              confirmation:
                text: Fahrt als PRIVAT beenden?

      # ---- Letzte Fahrten ------------------------------------------------
      - type: markdown
        title: Letzte Fahrten
        content: |
          {% set trips = state_attr('sensor.fahrtenbuch_fahrten_gesamt', 'letzte_fahrten') %}
          {%- if trips %}
          | # | Datum | Von | Bis | Start-KM | End-KM | Gefahren | Typ | Zweck | ID |
          |:-:|:------|:---:|:---:|---:|---:|---:|:----|:------|:---|
          {%- for t in trips %}
          | {{ loop.index }} | {{ t.start_time | as_datetime | as_timestamp | timestamp_custom('%d.%m.%Y') }} | {{ t.start_time | as_datetime | as_timestamp | timestamp_custom('%H:%M') }} | {{ t.end_time | as_datetime | as_timestamp | timestamp_custom('%H:%M') if t.end_time else '–' }} | {{ t.start_km | default('–') }} | {{ t.end_km | default('–') }} | {{ t.km_driven | default('–') }} | {{ '🏢' if t.trip_type == 'dienstlich' else '🏠' }} {{ t.trip_type }} | {{ t.purpose if t.purpose else '–' }} | `{{ t.id[:8] }}` |
          {%- endfor %}
          {%- else %}
          *Noch keine Fahrten aufgezeichnet.*
          {%- endif %}

      # ---- Fahrt bearbeiten ----------------------------------------------
      - type: entities
        title: Fahrt bearbeiten
        show_header_toggle: false
        entities:
          - entity: input_text.fahrtenbuch_edit_trip_id
            name: Fahrt-ID (erste 8 Zeichen aus Tabelle)
          - entity: input_number.fahrtenbuch_edit_start_km
            name: Start-KM
          - entity: input_number.fahrtenbuch_edit_end_km
            name: End-KM

      - type: button
        name: Speichern & km neu berechnen
        icon: mdi:content-save-edit-outline
        tap_action:
          action: call-service
          service: script.fahrtenbuch_update_trip
          confirmation:
            text: KM-Werte dieser Fahrt aktualisieren?

      # ---- CSV-Export ----------------------------------------------------
      - type: button
        name: Als CSV exportieren
        icon: mdi:file-export-outline
        tap_action:
          action: call-service
          service: fahrtenbuch.export_csv
          confirmation:
            text: Fahrtenbuch als CSV exportieren?
